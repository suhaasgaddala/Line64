<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Queue delivery accounting</title>
  <desc id="desc">A polished high-level accounting chart showing why work-sharing pops and multicast observations are different benchmark units.</desc>
  <defs>
    <linearGradient id="page-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111c31"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="bar-blue" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="bar-orange" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="bar-violet" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <filter id="bar-glow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#38bdf8" flood-opacity="0.24"/>
    </filter>
    <style>
      text { font-family: Inter, Arial, Helvetica, sans-serif; }
      .title { fill: #f8fafc; font-size: 36px; font-weight: 850; letter-spacing: -0.04em; }
      .subtitle { fill: #94a3b8; font-size: 17px; font-weight: 500; }
      .panel { fill: url(#panel-bg); stroke: #334155; stroke-width: 1.5; }
      .axis { stroke: #64748b; stroke-width: 2; }
      .grid { stroke: #334155; stroke-width: 1; opacity: 0.8; }
      .label { fill: #e5e7eb; font-size: 15px; font-weight: 800; }
      .muted { fill: #94a3b8; font-size: 13px; font-weight: 600; }
      .tiny { fill: #cbd5e1; font-size: 11px; font-weight: 700; letter-spacing: 0.02em; }
      .value { fill: #ffffff; font-size: 28px; font-weight: 900; }
      .chip { fill: #020617; stroke: #334155; stroke-width: 1.2; }
      .warning { fill: #431407; stroke: #fb923c; stroke-width: 1.4; }
      .blue { fill: url(#bar-blue); filter: url(#bar-glow); }
      .orange { fill: url(#bar-orange); filter: url(#bar-glow); }
      .violet { fill: url(#bar-violet); filter: url(#bar-glow); }
    </style>
  </defs>

  <rect width="1200" height="680" fill="url(#page-bg)"/>
  <g opacity="0.18">
    <path d="M0 92H1200M0 184H1200M0 276H1200M0 368H1200M0 460H1200M0 552H1200" stroke="#334155" stroke-width="1"/>
    <path d="M120 0V680M240 0V680M360 0V680M480 0V680M600 0V680M720 0V680M840 0V680M960 0V680M1080 0V680" stroke="#334155" stroke-width="1"/>
  </g>

  <text class="title" x="68" y="74">Delivery units are not interchangeable</text>
  <text class="subtitle" x="70" y="104">One publication can mean one exclusive pop, or many multicast observations. The benchmark reports them separately.</text>

  <rect class="panel" x="64" y="146" width="754" height="438" rx="28" filter="url(#soft-shadow)"/>
  <rect class="panel" x="854" y="146" width="282" height="438" rx="28" filter="url(#soft-shadow)"/>

  <g aria-label="Accounting chart">
    <line class="grid" x1="150" y1="230" x2="760" y2="230"/>
    <line class="grid" x1="150" y1="315" x2="760" y2="315"/>
    <line class="grid" x1="150" y1="400" x2="760" y2="400"/>
    <line class="axis" x1="150" y1="485" x2="760" y2="485"/>
    <line class="axis" x1="150" y1="196" x2="150" y2="485"/>

    <text class="tiny" x="114" y="489">0</text>
    <text class="tiny" x="110" y="404">1x</text>
    <text class="tiny" x="110" y="319">2x</text>
    <text class="tiny" x="110" y="234">3x</text>
    <text class="tiny" x="360" y="526">observations per publication</text>

    <rect class="blue" x="210" y="400" width="120" height="85" rx="16"/>
    <text class="value" x="254" y="453">1x</text>
    <text class="label" x="190" y="552">work-sharing</text>
    <text class="muted" x="187" y="572">one exclusive pop</text>

    <rect class="orange" x="416" y="230" width="120" height="255" rx="16"/>
    <text class="value" x="460" y="368">3x</text>
    <text class="label" x="396" y="552">multicast SPMC</text>
    <text class="muted" x="382" y="572">three observations</text>

    <rect class="violet" x="622" y="400" width="120" height="85" rx="16"/>
    <text class="value" x="666" y="453">1x</text>
    <text class="label" x="624" y="552">unique IDs</text>
    <text class="muted" x="597" y="572">same publication</text>
  </g>

  <g aria-label="Explanation cards">
    <text class="label" x="894" y="202">How to read it</text>
    <rect class="chip" x="890" y="226" width="210" height="80" rx="18"/>
    <text class="tiny" x="916" y="255">WORK-SHARING</text>
    <text class="muted" x="916" y="278">successful pop consumes</text>
    <text class="muted" x="916" y="298">one queued item</text>

    <rect class="chip" x="890" y="326" width="210" height="80" rx="18"/>
    <text class="tiny" x="916" y="355">MULTICAST SPMC</text>
    <text class="muted" x="916" y="378">each consumer can observe</text>
    <text class="muted" x="916" y="398">the same sequence</text>

    <rect class="warning" x="890" y="436" width="210" height="88" rx="20"/>
    <text class="tiny" x="916" y="466">NOT A THROUGHPUT RANKING</text>
    <text class="muted" x="916" y="490">The chart shows accounting</text>
    <text class="muted" x="916" y="510">units, not measured speed.</text>
  </g>
</svg>
