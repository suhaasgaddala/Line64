name: Verification

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tla-model-checking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Download pinned TLA+ tools
        run: |
          mkdir -p build-verification/tools/tla
          curl --fail --location --retry 3 \
            https://github.com/tlaplus/tlaplus/releases/download/v1.7.4/tla2tools.jar \
            --output build-verification/tools/tla/tla2tools.jar
          echo "936a262061c914694dfd669a543be24573c45d5aa0ff20a8b96b23d01e050e88  build-verification/tools/tla/tla2tools.jar" \
            | sha256sum --check --strict
      - name: Check bounded queue models
        run: ./verification/run_tlc.sh

  genmc-weak-memory-checking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check synchronization protocol harnesses
        run: ./verification/run_genmc.sh
      - name: Confirm broken handoffs are rejected
        run: ./verification/run_negative_controls.sh
